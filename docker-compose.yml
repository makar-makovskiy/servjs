services:
  postgres:
    container_name: postgres
    image: postgres:16.4
    hostname: db
    volumes:
      - database:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    env_file:
      - .postgres.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    container_name: adminer
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  frontend:
    build:
      context: ./serv/client
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    depends_on:
      postgres:
        condition: service_healthy
    build:
      context: ./serv/server
      dockerfile: Dockerfile
    container_name: backend
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/app
      PORT: "5000"
    ports:
      - "5000:5000"

volumes:
  database:
